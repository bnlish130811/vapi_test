<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Speaking Assessment</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f8fafc; font-family: sans-serif; }
        .container { text-align: center; background: white; padding: 3rem; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 400px; }
        h1 { color: #1e293b; margin-bottom: 1rem; }
        p { color: #64748b; margin-bottom: 2rem; }
        #start-btn { 
            background-color: #2563eb; color: white; border: none; padding: 18px 36px; 
            font-size: 1.2rem; font-weight: 600; border-radius: 50px; cursor: pointer; width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Speaking Assessment</h1>
        <p>Click the button below to start your interview. <br><b>Microphone access is required.</b></p>
        <button id="start-btn">Start Speaking Now</button>
    </div>

    <script 
        id="retell-widget" 
        src="https://dashboard.retellai.com/retell-widget.js" 
        type="module" 
        data-public-key="public_key_392eb2c6b78f356a1ff3f" 
        data-agent-id="agent_e1a35746de05b975057bb44284">
    </script>

    <script>
        const startBtn = document.getElementById('start-btn');

        startBtn.addEventListener('click', () => {
            // Retell 위젯이 로드되었는지 확인 후 대화 시작
            if (window.RetellWebWidget) {
                // startCall() 또는 open() 중 위젯 설정에 맞는 함수 호출
                try {
                    window.RetellWebWidget.open(); 
                } catch (e) {
                    console.error("Failed to start call:", e);
                }
            } else {
                alert("AI Engine is still loading. Please wait 3 seconds and try again.");
            }
        });
    </script>
</body>
</html>
