<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gather Speaking Test Station</title>
    <style>
      body { font-family: system-ui, Arial; margin: 16px; }
      button { padding: 12px 16px; margin-right: 8px; }
      #status { margin-top: 12px; }
    </style>
  </head>
  <body>
    <h3>Speaking Test Station</h3>
    <div>
      <button id="start">Start</button>
      <button id="stop" disabled>Stop</button>
    </div>
    <div id="status">Idle</div>

    <script type="module">
      import Vapi from "https://cdn.skypack.dev/@vapi-ai/web";

      const PUBLIC_KEY = "YOUR_PUBLIC_VAPI_KEY";

      const params = new URLSearchParams(window.location.search);
      const assistantId = params.get("assistantId"); // required
      const participantId = params.get("participantId") || "anon";
      const stage = params.get("stage") || "1";
      const priorContext = params.get("priorContext") || ""; // optional

      if (!assistantId) {
        document.getElementById("status").textContent =
          "Missing ?assistantId= in the URL";
        throw new Error("Missing assistantId");
      }

      const vapi = new Vapi(PUBLIC_KEY);

      const startBtn = document.getElementById("start");
      const stopBtn = document.getElementById("stop");
      const status = document.getElementById("status");

      vapi.on("call-start", () => (status.textContent = "Call started"));
      vapi.on("call-end", () => {
        status.textContent = "Call ended";
        startBtn.disabled = false;
        stopBtn.disabled = true;
      });
      vapi.on("error", (e) => (status.textContent = "Error: " + e.message));

      startBtn.onclick = async () => {
        startBtn.disabled = true;
        stopBtn.disabled = false;
        status.textContent = "Starting...";

        await vapi.start(assistantId, {
          assistantOverrides: {
            variableValues: {
              participantId,
              stage,
              priorContext
            }
          }
        });
      };

      stopBtn.onclick = () => vapi.stop();
    </script>
  </body>
</html>
